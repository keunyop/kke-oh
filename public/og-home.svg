<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">KKE-OH game maker playground</title>
  <desc id="desc">A bright kid-friendly game maker share image for KKE-OH.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff7c8"/>
      <stop offset="34%" stop-color="#ffd1a9"/>
      <stop offset="67%" stop-color="#ff9ea8"/>
      <stop offset="100%" stop-color="#8ed8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17345a" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="164" cy="118" r="74" fill="#fffdf6" opacity="0.95"/>
  <circle cx="1022" cy="126" r="92" fill="#fff28a" opacity="0.9"/>
  <circle cx="930" cy="532" r="98" fill="#86f0c0" opacity="0.9"/>
  <g filter="url(#shadow)">
    <rect x="72" y="88" width="216" height="216" rx="40" fill="#1e5dff" transform="rotate(-9 180 196)"/>
    <text x="178" y="222" text-anchor="middle" font-size="106" font-weight="900" fill="#ffffff" font-family="Arial, Helvetica, sans-serif">+ +</text>
    <circle cx="194" cy="402" r="76" fill="#ff7a4f"/>
    <text x="194" y="428" text-anchor="middle" font-size="88" font-weight="900" fill="#fff6d2" font-family="Arial, Helvetica, sans-serif">*</text>
    <rect x="930" y="92" width="224" height="224" rx="46" fill="#0a2540" transform="rotate(10 1042 204)"/>
    <rect x="976" y="136" width="132" height="132" rx="30" fill="#86f0c0" transform="rotate(10 1042 204)"/>
    <text x="1042" y="222" text-anchor="middle" font-size="76" font-weight="900" fill="#123954" font-family="Arial, Helvetica, sans-serif">&gt;</text>
    <rect x="894" y="470" width="202" height="118" rx="28" fill="#ffffff" transform="rotate(-11 995 529)"/>
    <text x="995" y="540" text-anchor="middle" font-size="60" font-weight="800" fill="#20364f" font-family="Arial, Helvetica, sans-serif">^_^</text>
  </g>
  <g fill="#10203b" font-family="Arial, Helvetica, sans-serif">
    <rect x="334" y="114" width="178" height="52" rx="26" fill="#ffffff" opacity="0.85"/>
    <text x="423" y="148" text-anchor="middle" font-size="30" font-weight="900">KKE-OH!</text>
    <rect x="526" y="114" width="280" height="52" rx="26" fill="#10203b"/>
    <text x="666" y="148" text-anchor="middle" font-size="24" font-weight="800" fill="#fff3be">Make games. Play together.</text>
    <text x="334" y="258" font-size="84" font-weight="900">
      <tspan x="334" dy="0">Bright little game ideas</tspan>
      <tspan x="334" dy="90">turn into real playable fun.</tspan>
    </text>
    <text x="336" y="446" font-size="34" fill="#234161">
      <tspan x="336" dy="0">A kid-friendly playground for arcade adventures, puzzle games,</tspan>
      <tspan x="336" dy="44">and silly score chases right in the browser.</tspan>
    </text>
  </g>
</svg>